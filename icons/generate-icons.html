<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Chrome Extension Icons</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f0f0f0;
        }
        .icon-container {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }
        .icon {
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #ccc;
            background-color: white;
        }
        .icon-16 {
            width: 16px;
            height: 16px;
        }
        .icon-48 {
            width: 48px;
            height: 48px;
        }
        .icon-128 {
            width: 128px;
            height: 128px;
        }
        .pet-icon {
            background-color: #A8DADC;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .pet-face {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .pet-eyes {
            display: flex;
            gap: 2px;
            margin-bottom: 2px;
        }
        .pet-eye {
            width: 2px;
            height: 2px;
            background-color: #333;
            border-radius: 50%;
        }
        .pet-mouth {
            width: 4px;
            height: 2px;
            background-color: #333;
            border-radius: 0 0 2px 2px;
        }
        .icon-48 .pet-eye {
            width: 6px;
            height: 6px;
        }
        .icon-48 .pet-eyes {
            gap: 6px;
            margin-bottom: 6px;
        }
        .icon-48 .pet-mouth {
            width: 12px;
            height: 6px;
            border-radius: 0 0 6px 6px;
        }
        .icon-128 .pet-eye {
            width: 16px;
            height: 16px;
        }
        .icon-128 .pet-eyes {
            gap: 16px;
            margin-bottom: 16px;
        }
        .icon-128 .pet-mouth {
            width: 32px;
            height: 16px;
            border-radius: 0 0 16px 16px;
        }
        button {
            padding: 10px 20px;
            background-color: #A8DADC;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #9BF6FF;
        }
    </style>
</head>
<body>
    <h1>Chrome AI Pet Extension Icons</h1>
    <p>Right-click on each icon and select "Save Image As..." to save as PNG files.</p>
    <div class="icon-container">
        <div>
            <h3>16x16</h3>
            <div class="icon icon-16">
                <div class="pet-icon" style="width: 14px; height: 14px;">
                    <div class="pet-face">
                        <div class="pet-eyes">
                            <div class="pet-eye"></div>
                            <div class="pet-eye"></div>
                        </div>
                        <div class="pet-mouth"></div>
                    </div>
                </div>
            </div>
        </div>
        <div>
            <h3>48x48</h3>
            <div class="icon icon-48">
                <div class="pet-icon" style="width: 42px; height: 42px;">
                    <div class="pet-face">
                        <div class="pet-eyes">
                            <div class="pet-eye"></div>
                            <div class="pet-eye"></div>
                        </div>
                        <div class="pet-mouth"></div>
                    </div>
                </div>
            </div>
        </div>
        <div>
            <h3>128x128</h3>
            <div class="icon icon-128">
                <div class="pet-icon" style="width: 112px; height: 112px;">
                    <div class="pet-face">
                        <div class="pet-eyes">
                            <div class="pet-eye"></div>
                            <div class="pet-eye"></div>
                        </div>
                        <div class="pet-mouth"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <button onclick="window.print()">Print Page</button>
</body>
</html>
